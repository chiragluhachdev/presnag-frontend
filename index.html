<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Primary SEO -->
    <title>PreSnag – Order Ahead. Skip the Queue.</title>
    <meta
      name="description"
      content="Skip the queue with PreSnag. Browse nearby cafés and restaurants, order ahead, pay online, and pick up your food when it's ready—fast, simple, and hassle-free."
    />
    <link rel="canonical" href="https://www.presnag.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="PreSnag – Order Ahead. Skip the Queue." />
    <meta
      property="og:description"
      content="Skip the queue with PreSnag. Browse nearby cafés and restaurants, order ahead, pay online, and pick up your food when it's ready—fast, simple, and hassle-free."
    />
    <meta property="og:site_name" content="PreSnag" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.presnag.com" />
    <meta property="og:image" content="https://www.presnag.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PreSnag – Order Ahead. Skip the Queue." />
    <meta
      name="twitter:description"
      content="Skip the queue with PreSnag. Browse nearby cafés and restaurants, order ahead, pay online, and pick up your food when it's ready—fast, simple, and hassle-free."
    />
    <meta name="twitter:image" content="https://www.presnag.com/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured data: Organization (helps Google associate the official logo) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PreSnag",
        "url": "https://www.presnag.com",
        "logo": "https://www.presnag.com/android-chrome-512x512.png"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
